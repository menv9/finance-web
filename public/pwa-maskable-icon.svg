<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1024 1024" role="img">
  <title>FinGes</title>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1B2434"/>
      <stop offset="100%" stop-color="#0A0F1A"/>
    </linearGradient>
    <linearGradient id="fin-grad" x1="0" y1="430" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8896A8"/>
    </linearGradient>
    <linearGradient id="ges-grad" x1="0" y1="430" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5AEC3"/>
