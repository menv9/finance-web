<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1024 1024" role="img">
  <title>FinGes</title>
  <defs>
    <clipPath id="clip">
      <rect x="72" y="72" width="880" height="880" rx="200"/>
    </clipPath>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1B2434"/>
      <stop offset="100%" stop-color="#0A0F1A"/>
    </linearGradient>
    <linearGradient id="fin-grad" x1="0" y1="400" x2="0" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8896A8"/>
    </linearGradient>
    <linearGradient id="ges-grad" x1="0" y1="400" x2="0" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5AEC3"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="200" fill="url(#bg-grad)"/>

  <g clip-path="url(#clip)">

    <!-- Subtle top sheen -->
    <ellipse cx="512" cy="72" rx="440" ry="120" fill="#FFFFFF" opacity="0.04"/>

    <!-- Shadow layer for depth -->
    <text
      x="512" y="574"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'Fraunces', Georgia, serif"
      font-size="195"
      font-weight="300"
      letter-spacing="2"
      fill="none"
      stroke="#000000"
      stroke-width="20"
      opacity="0.28"
    ><tspan>FinGes</tspan></text>

    <!-- Main text -->
    <text
      x="512" y="566"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'Fraunces', Georgia, serif"
      font-size="195"
      font-weight="300"
      letter-spacing="2"
    ><tspan fill="url(#fin-grad)">Fin</tspan><tspan fill="none" stroke="url(#ges-grad)" stroke-width="3.5" paint-order="stroke">Ges</tspan></text>

  </g>
</svg>
