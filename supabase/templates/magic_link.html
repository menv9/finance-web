<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Magic Link</title>
  </head>
  <body style="margin:0;padding:0;background-color:#141B26;font-family:'Instrument Sans',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#141B26;min-height:100vh;">
      <tr>
        <td align="center" style="padding:48px 16px;">

          <!-- Card -->
          <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:480px;background-color:#1B2434;border-radius:16px;border:1px solid rgba(210,220,240,0.09);overflow:hidden;">

            <!-- Top accent bar -->
            <tr>
              <td style="height:3px;background:linear-gradient(90deg,#5FB394,#7BC9AB);"></td>
            </tr>

            <!-- Header -->
            <tr>
              <td align="center" style="padding:40px 40px 0 40px;">
                <!-- Icon -->
                <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background-color:rgba(95,179,148,0.16);border-radius:12px;margin-bottom:24px;">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9L12 4L21 9V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V9Z" stroke="#5FB394" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M9 21V13H15V21" stroke="#5FB394" stroke-width="1.5" stroke-linejoin="round"/>
                  </svg>
                </div>

                <!-- App name -->
                <p style="margin:0 0 8px 0;font-size:11px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:#A5AEC3;">Personal Finance</p>

                <!-- Heading -->
                <h1 style="margin:0;font-family:Georgia,serif;font-size:28px;font-weight:400;color:#E6EAF2;letter-spacing:-0.02em;line-height:1.2;">Your magic link</h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding:24px 40px 0 40px;">
                <p style="margin:0;font-size:15px;line-height:1.6;color:#A5AEC3;text-align:center;">
                  Click the button below to sign in. This link expires in <span style="color:#E6EAF2;font-weight:500;">60 minutes</span> and can only be used once.
                </p>
              </td>
            </tr>

            <!-- CTA -->
            <tr>
              <td align="center" style="padding:32px 40px;">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;background-color:#5FB394;color:#0B1E16;font-family:'Instrument Sans',ui-sans-serif,system-ui,sans-serif;font-size:15px;font-weight:600;text-decoration:none;padding:14px 36px;border-radius:10px;letter-spacing:0.01em;">
                  Sign in
                </a>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding:0 40px;">
                <div style="height:1px;background:rgba(210,220,240,0.09);"></div>
              </td>
            </tr>

            <!-- Footer note -->
            <tr>
              <td style="padding:24px 40px 40px 40px;">
                <p style="margin:0;font-size:13px;line-height:1.6;color:#6F788E;text-align:center;">
                  If you didn't request this, you can safely ignore this email.<br/>
                  No account will be created without clicking the link.
                </p>
              </td>
            </tr>

          </table>
          <!-- /Card -->

          <!-- Bottom note -->
          <p style="margin:24px 0 0 0;font-size:12px;color:#6F788E;text-align:center;">
            Secured by <a href="https://supabase.com" style="color:#5FB394;text-decoration:none;">Supabase</a>
          </p>

        </td>
      </tr>
    </table>
  </body>
</html>
